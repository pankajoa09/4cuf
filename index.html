<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4CUF — Thailand Car Events | Meets, Track Days, Shows & Cruises</title>
<meta name="description" content="Discover car events across Thailand — meets, track days, shows, and cruises in Bangkok, Pattaya, Chiang Mai, Phuket and beyond.">
<meta name="keywords" content="Thailand car events, car meets Bangkok, track days Thailand, car shows Pattaya, JDM Thailand, car cruise Chiang Mai, Thai car culture, supercar events Thailand">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="4CUF — Thailand Car Events">
<meta name="twitter:description" content="Find car events across Thailand. Meets, track days, shows, and cruises.">

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","name":"4CUF","description":"Car events board for Thailand — meets, track days, shows, and cruises","url":"https://www.4cuf.com"}</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;
--text:#e8e8e8;--text2:#888;--accent:#ff3e1d;--accent2:#ff6b4a;
--meet:#22d3ee;--track:#f59e0b;--show:#a78bfa;--cruise:#34d399;
--radius:6px;--font:"DM Sans",sans-serif;--display:"Bebas Neue",sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5;min-height:100vh;overflow-x:hidden}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

header{padding:2rem 1.5rem 1rem;max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;flex-wrap:wrap}
.logo{line-height:1;display:flex;flex-direction:column;align-items:flex-start}
.logo img{height:clamp(3rem,7vw,3.8rem);width:auto;display:block}
.logo small{display:block;font-family:var(--font);font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text2);font-weight:400;margin-top:.5rem}
.updated{font-family:var(--font);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.updated b{color:var(--accent);font-weight:600;letter-spacing:.04em}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem}
.contact{display:flex;gap:.35rem;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.contact-label{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-right:.3rem}
.reveal-btn{
  padding:.35rem .7rem;font-size:.7rem;font-weight:600;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);border-radius:var(--radius);cursor:pointer;
  transition:all .15s;text-transform:uppercase;letter-spacing:.06em;font-family:var(--font);
  text-decoration:none;display:inline-block;white-space:nowrap;
}
.reveal-btn:hover{border-color:var(--accent);color:var(--text)}
.reveal-btn.revealed{background:var(--accent);border-color:var(--accent);color:#fff}
.siblings{font-size:.7rem;color:var(--text2);letter-spacing:.05em}
.siblings a{color:var(--accent);text-decoration:none;font-weight:600}
.siblings a:hover{color:var(--accent2)}

.controls{max-width:1100px;margin:0 auto;padding:.8rem 1.5rem;display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.search{
flex:1;min-width:200px;padding:.55rem .8rem;background:var(--surface);border:1px solid var(--border);
color:var(--text);font-family:var(--font);font-size:.85rem;border-radius:var(--radius);outline:none;transition:border .15s;
}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:#555}
.filters{display:flex;gap:.35rem;flex-wrap:wrap}
.filter-btn{
padding:.4rem .75rem;font-size:.75rem;font-weight:600;border:1px solid var(--border);
background:var(--surface);color:var(--text2);border-radius:var(--radius);cursor:pointer;
transition:all .15s;text-transform:uppercase;letter-spacing:.04em;font-family:var(--font);
}
.filter-btn:hover{border-color:#444;color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-btn[data-t="meet"].active{background:var(--meet);border-color:var(--meet);color:#000}
.filter-btn[data-t="track"].active{background:var(--track);border-color:var(--track);color:#000}
.filter-btn[data-t="show"].active{background:var(--show);border-color:var(--show);color:#000}
.filter-btn[data-t="cruise"].active{background:var(--cruise);border-color:var(--cruise);color:#000}

.grid{max-width:1100px;margin:1rem auto;padding:0 1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.8rem}
.card{
background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
padding:1.2rem;cursor:default;transition:border-color .15s,transform .15s;position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.card[data-t="meet"]::before{background:var(--meet)}
.card[data-t="track"]::before{background:var(--track)}
.card[data-t="show"]::before{background:var(--show)}
.card[data-t="cruise"]::before{background:var(--cruise)}
.card:hover{border-color:#333;transform:translateY(-2px)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.5rem}
.card-title{font-family:var(--display);font-size:1.35rem;letter-spacing:.03em;line-height:1.1;color:var(--text);text-decoration:none;display:inline-block}
a.card-title:hover{color:var(--accent)}
.card-title .ext{font-size:.75rem;opacity:.4;margin-left:.15em;vertical-align:.1em}
a.card-title:hover .ext{opacity:1}
.tag{
font-size:.6rem;font-weight:600;padding:.2rem .5rem;border-radius:3px;
text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;flex-shrink:0;
}
.tag-meet{background:rgba(34,211,238,.12);color:var(--meet)}
.tag-track{background:rgba(245,158,11,.12);color:var(--track)}
.tag-show{background:rgba(167,139,250,.12);color:var(--show)}
.tag-cruise{background:rgba(52,211,153,.12);color:var(--cruise)}
.card-meta{display:flex;gap:1rem;font-size:.78rem;color:var(--text2);margin-bottom:.5rem;flex-wrap:wrap;align-items:center}
.card-meta svg{width:13px;height:13px;vertical-align:-2px;margin-right:3px;opacity:.6}
.loc-link{color:var(--text2);text-decoration:none;transition:color .15s}
.loc-link:hover{color:var(--accent)}
.loc-link:hover svg{opacity:1}
.countdown{font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.18rem .45rem;border-radius:3px;background:rgba(255,62,29,.12);color:var(--accent);white-space:nowrap}
.countdown.soon{background:var(--accent);color:#fff}
.countdown.today{background:#fff;color:#000;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.card-desc{font-size:.8rem;color:#999;line-height:1.5}
.card-poster{margin:-1.2rem -1.2rem 1rem;aspect-ratio:3/4;overflow:hidden;background:#000;max-height:320px}
.card-poster img{width:100%;height:100%;object-fit:cover;display:block}
.empty{grid-column:1/-1;text-align:center;padding:3rem 1rem;color:var(--text2);font-size:.9rem}

.stripe{max-width:1100px;margin:0 auto;padding:0 1.5rem}
.stripe hr{border:none;border-top:1px solid var(--border)}

.count{max-width:1100px;margin:0 auto;padding:.4rem 1.5rem;font-size:.72rem;color:var(--text2);letter-spacing:.03em}
.disclaimer{max-width:1100px;margin:0 auto;padding:.5rem 1.5rem;font-size:.72rem;color:var(--text2);letter-spacing:.02em;font-style:italic;opacity:.75}
@media(max-width:640px){.disclaimer{padding:.5rem 1rem}}

.past-head{max-width:1100px;margin:2.5rem auto .4rem;padding:0 1.5rem;font-family:var(--display);font-size:1.6rem;letter-spacing:.06em;color:var(--text2);font-weight:400;border-top:1px solid var(--border);padding-top:1.5rem}
.past-head.hidden{display:none}
.grid.past .card{opacity:.55}
.grid.past .card:hover{opacity:1}

@media(max-width:640px){
  header{padding:1.2rem 1rem .6rem}
  .controls{padding:.6rem 1rem}
  .grid{padding:0 1rem;grid-template-columns:1fr;gap:.6rem}
  .stripe{padding:0 1rem}
  .count{padding:.4rem 1rem}
}
</style>
</head>
<body>

<header>
  <div class="logo"><img src="logo.svg" alt="4CUF"><small>Thailand Car Events</small></div>
  <div class="header-right">
    <div class="siblings">Also: <a href="art.html">Art →</a></div>
    <div class="contact"><span class="contact-label">Talk to me:</span>
      <button class="reveal-btn" data-id="line" onclick="reveal(this)">Line</button>
      <button class="reveal-btn" data-id="ig" onclick="reveal(this)">Instagram</button>
      <button class="reveal-btn" data-id="wechat" onclick="reveal(this)">WeChat</button>
    </div>
    <div class="updated">Updated: <b id="updated-date">—</b></div>
  </div>
</header>

<div class="stripe"><hr></div>

<div class="controls">
  <input class="search" type="text" placeholder="Search events or locations…" oninput="render()">
  <div class="filters">
    <button class="filter-btn active" data-t="all" onclick="setFilter(this)">All</button>
    <button class="filter-btn" data-t="meet" onclick="setFilter(this)">Meets</button>
    <button class="filter-btn" data-t="track" onclick="setFilter(this)">Track</button>
    <button class="filter-btn" data-t="show" onclick="setFilter(this)">Shows</button>
    <button class="filter-btn" data-t="cruise" onclick="setFilter(this)">Cruise</button>
  </div>
</div>

<div class="count" id="count"></div>
<div class="disclaimer">Please click through to each event's linked source, or do a quick independent check, before you attend — details can change and errors slip in.</div>
<div class="grid" id="grid"></div>

<h2 class="past-head" id="past-head">Past Events</h2>
<div class="grid past" id="grid-past"></div>

<script>
const SVG_CAL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
const SVG_PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';

const EVENTS=[
{name:"TSS Round 1 — Chang Circuit",date:"2026-05-21",loc:"Chang International Circuit, Buriram",type:"track",desc:"Season-opening race weekend of the Thailand Super Series. GT3, Super Production, TCR Thailand and support classes. May 21–24.",url:"https://51gt3.com/en/article/101332/tss-thailand-super-series-2026-provisional-calendar"},
{name:"BMW M Race Track Training",date:"2026-05-16",loc:"Bira International Circuit, Pattaya",type:"track",desc:"Two-day factory M performance training at Bira. Briefing Friday night, full track day Saturday & Sunday. May 16–17.",url:"https://www.bmw.co.th/en/topics/magazine/bmw-m-race-track-training.html"},
{name:"Automotive Manufacturing Expo 2026",date:"2026-06-17",loc:"BITEC Bangna, Bangkok",type:"show",desc:"ASEAN's biggest automotive parts & manufacturing technology show. 21st edition. Trade-focused but open to enthusiasts. Jun 17–20.",url:"https://www.automanexpo.com/"},
{name:"Bangsaen Grand Prix 2026",date:"2026-07-03",loc:"Bangsaen Street Circuit, Chonburi",type:"track",desc:"20th anniversary of Thailand's biggest street race. GT3, Porsche Carrera Cup Asia, TCR support. Jul 3–5.",url:"https://renndriver.com/events/bangsaen-grand-prix/"},
{name:"IMPACT Speed Fest 2026",date:"2026-07-17",loc:"IMPACT Challenger Hall 2-3, Bangkok",type:"show",desc:"2,500+ cars, 300+ brands, 100+ clubs. Live restoration, auctions, rare builds including HKS R32 and MADLANE 935. Jul 17–19.",url:"https://impactspeedfest.com/"},
{name:"Thailand International Motor Expo 2026",date:"2026-12-02",loc:"IMPACT Challenger 1-3, Nonthaburi",type:"show",desc:"The 43rd Motor Expo. 12-day showcase of production cars, EVs, hydrogen & e-fuel concepts. Dec 2–13.",url:"https://www.motorexpo.co.th/"},
{name:"Rising Sunday — Monthly Meet",date:"2026-05-03",loc:"Block 28, Samyan, Bangkok",type:"meet",desc:"Bangkok's premier monthly cars & coffee. JDM legends, European exotics, old-school rides. First Sunday of the month, free entry.",url:"https://renndriver.com/events/rising-sunday/"},
{name:"Only Octane Cars & Coffee",date:"2026-04-26",loc:"Crystal Design Center (CDC), Bangkok",type:"meet",desc:"Classic cars & coffee-style Sunday morning meet at CDC. Supercars, classics, JDM builds. Relaxed, community-driven.",url:"https://www.timeout.com/bangkok/things-to-do/only-octane-cars-coffee"},
{name:"Bangkok International Motor Show 2026",date:"2026-03-25",loc:"IMPACT Muang Thong Thani, Bangkok",type:"show",desc:"The 47th edition. Theme 'Iconic Synchronicity'. 45 brands, new EV launches from Tesla, Chery and more. Mar 25 – Apr 5.",url:"https://bims47.motorshow.in.th/en/"},
{name:"Bangkok Hot Rod Custom Show 2026",date:"2026-05-16",loc:"IMPACT Exhibition Hall 11-12, Bangkok",type:"show",desc:"Thailand's premier custom & hot rod show. Nation's largest gathering of custom builds, judged by international industry experts. May 16–17, 11am–10pm.",url:"https://www.impact.co.th/en/visitors/event-calendar/exhibition-public/bangkok-hot-rod-custom-show-2026"},
{name:"MotoGP Thailand Grand Prix 2026",date:"2026-02-27",loc:"Chang International Circuit, Buriram",type:"track",desc:"MotoGP 2026 season opener. Three days of practice, sprint, and the full-length GP. Feb 27 – Mar 1.",url:"https://www.motogp.com/en/calendar/2026/event/thailand/364a0bd9-d3c2-4ab3-a4cd-211ff469953e"},
{name:"HCD Night Track Day",date:"2026-03-19",loc:"Chang International Circuit, Buriram",type:"track",desc:"After-dark lapping session organised by HDrive. Open pitlane, instruction available, street cars welcome.",url:"https://www.hdrive-racing.com/post/hcd-track-day-2026"},
{name:"TSS Finale — Chang Circuit",date:"2026-10-30",loc:"Chang International Circuit, Buriram",type:"track",desc:"Season finale of the Thailand Super Series. GT3, GT4, GT Cup and support classes decide the championship. Oct 30 – Nov 1.",url:"https://en.wikipedia.org/wiki/2026_Thailand_Super_Series"},
{name:"D1GP Thailand — Season Finale",date:"2026-12-18",loc:"Chang International Circuit, Buriram",type:"track",desc:"Drift championship finale rounds 5 & 6 at BRIC's drift track. Night running, tandem battles. Dec 18–20.",url:"https://www.instagram.com/d1gpthailand/"},
{name:"D1GP Thailand — Season Opener",date:"2026-04-03",loc:"Chang International Circuit, Buriram",type:"track",desc:"Opening drift rounds of the 2026 D1GP Thailand season with night running at BRIC drift track. Apr 3–5.",url:"https://www.facebook.com/d1gpthailand/posts/920490230823045/"},
{name:"Landed Show Thailand",date:"2026-02-14",loc:"Rancho Charnvee Resort, Khao Yai",type:"show",desc:"Outdoor luxury & supercar showcase with curated classics, vendor booths and hospitality at a Khao Yai golf resort.",url:"https://renndriver.com/resources/thailand-car-events/"},
{name:"XO Autosport Summer Meet 2026",date:"2026-03-28",loc:"IMPACT Muang Thong Thani, Nonthaburi",type:"show",desc:"Thailand's biggest tuning car show, 30th anniversary edition. Custom builds, widebody kits, engine swaps across multiple halls. Mar 28–29.",url:"https://renndriver.com/events/xo-autosport/"},
{name:"MobilityTech Asia Bangkok 2026",date:"2026-07-01",loc:"Bangkok (QSNCC / BITEC)",type:"show",desc:"SEA's leading EV and smart-mobility expo, formerly Electric Vehicle Asia. 250+ brands, iEVTech conference, Future MOVE Forum. Jul 1–3.",url:"https://www.mobilitytechasia-bkk.com/"},
{name:"BMW M Race Track Training — Nov Session",date:"2026-11-14",loc:"Bira International Circuit, Pattaya",type:"track",desc:"Second 2026 factory M performance training at Bira. Briefing Saturday night, full track day Sunday. Nov 14–15.",url:"https://www.bmw.co.th/en/topics/magazine/bmw-m-race-track-training.html"}
];

let filter='all';
function fmt(d){const o=new Date(d+'T00:00:00');return o.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function thaiToday(){
  const now=new Date();
  const thai=new Date(now.getTime()+(now.getTimezoneOffset()+420)*60000);
  return thai.toISOString().slice(0,10);
}
function daysUntil(d){
  const today=thaiToday();
  const a=new Date(today+'T00:00:00Z'),b=new Date(d+'T00:00:00Z');
  return Math.round((b-a)/86400000);
}
function countdown(d){
  const n=daysUntil(d);
  if(n<0)return '';
  if(n===0)return '<span class="countdown today">Today</span>';
  if(n===1)return '<span class="countdown soon">Tomorrow</span>';
  if(n<=7)return `<span class="countdown soon">${n} days left</span>`;
  let txt;
  if(n<14)txt=`${n} days left`;
  else if(n<60){const w=Math.round(n/7);txt=`${w} week${w!==1?'s':''} left`;}
  else if(n<365){const m=Math.round(n/30);txt=`${m} month${m!==1?'s':''} left`;}
  else{const y=Math.round(n/365);txt=`${y} year${y!==1?'s':''} left`;}
  return `<span class="countdown">${txt}</span>`;
}

function card(e){
  const title=e.url?`<a class="card-title" href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.name)} <span class="ext">↗</span></a>`:`<span class="card-title">${esc(e.name)}</span>`;
  const poster=e.poster?`<div class="card-poster"><img src="${esc(e.poster)}" alt="${esc(e.name)} poster" loading="lazy"></div>`:'';
  return `
    <div class="card" data-t="${e.type}">
      ${poster}
      <div class="card-head">
        ${title}
        <span class="tag tag-${e.type}">${e.type}</span>
      </div>
      <div class="card-meta">
        <span>${SVG_CAL} ${fmt(e.date)}</span>
        <a class="loc-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.loc)}" target="_blank" rel="noopener">${SVG_PIN} ${esc(e.loc)}</a>
        ${countdown(e.date)}
      </div>
      <div class="card-desc">${esc(e.desc)}</div>
    </div>`;
}

function render(){
  const q=document.querySelector('.search').value.toLowerCase();
  const today=thaiToday();
  const match=e=>{
    if(filter!=='all'&&e.type!==filter)return false;
    if(q&&!e.name.toLowerCase().includes(q)&&!e.loc.toLowerCase().includes(q))return false;
    return true;
  };
  const upcoming=EVENTS.filter(e=>e.date>=today&&match(e)).sort((a,b)=>a.date.localeCompare(b.date));
  const past=EVENTS.filter(e=>e.date<today&&match(e)).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('count').textContent=upcoming.length+' upcoming event'+(upcoming.length!==1?'s':'');
  const g=document.getElementById('grid');
  g.innerHTML=upcoming.length?upcoming.map(card).join(''):'<div class="empty">No upcoming events match your search.</div>';
  const gp=document.getElementById('grid-past');
  const ph=document.getElementById('past-head');
  if(past.length){gp.innerHTML=past.map(card).join('');ph.classList.remove('hidden');}
  else{gp.innerHTML='';ph.classList.add('hidden');}
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function setFilter(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');filter=btn.dataset.t;render();
}

const HANDLES={
  line:{handle:'pankajahuja',url:'https://line.me/R/ti/p/~pankajahuja'},
  ig:{handle:'pankajahuja',url:'https://instagram.com/pankajahuja'},
  wechat:{handle:'pankajoa',url:null}
};
function reveal(btn){
  const h=HANDLES[btn.dataset.id];if(!h)return;
  btn.classList.add('revealed');
  const label=btn.textContent.split(' —')[0];
  if(h.url){
    const a=document.createElement('a');
    a.className='reveal-btn revealed';a.href=h.url;a.target='_blank';a.rel='noopener';
    a.textContent=label+' — @'+h.handle;
    btn.replaceWith(a);
  }else{
    btn.textContent=label+' — '+h.handle;
    btn.onclick=()=>navigator.clipboard?.writeText(h.handle);
    btn.title='Click to copy';
  }
}

document.getElementById('updated-date').textContent=fmt(thaiToday());
render();
</script>
</body>
</html>
