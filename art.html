<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thailand Art Events — Doujin, Illustration, Fairs & Markets</title>
<meta name="description" content="A curated calendar of art, doujin, illustration and maker events across Thailand. The stuff you can't find on Google.">
<meta name="robots" content="index,follow">
<meta property="og:title" content="Thailand Art Events">
<meta property="og:description" content="Curated calendar of doujin, illustration, and maker events across Thailand.">
<meta property="og:type" content="website">
<meta property="og:locale" content="en_TH">
<meta name="theme-color" content="#a78bfa">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;
--text:#e8e8e8;--text2:#888;--accent:#a78bfa;--accent2:#c4b5fd;
--con:#22d3ee;--fair:#f59e0b;--market:#f472b6;--exhibit:#34d399;
--radius:6px;--font:"DM Sans",sans-serif;--display:"Bebas Neue",sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5;min-height:100vh;overflow-x:hidden}
::selection{background:var(--accent);color:#000}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

header{padding:2rem 1.5rem 1rem;max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;flex-wrap:wrap}
.logo{font-family:sans-serif;font-size:clamp(2.4rem,6vw,3.2rem);letter-spacing:.1em;line-height:1;color:#fff;font-weight:700}
.logo small{display:block;font-family:var(--font);font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text2);font-weight:400;margin-top:.4rem}
.updated{font-family:var(--font);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.updated b{color:var(--accent);font-weight:600;letter-spacing:.04em}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem}
.contact{display:flex;gap:.35rem;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.contact-label{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-right:.3rem}
.reveal-btn{
  padding:.35rem .7rem;font-size:.7rem;font-weight:600;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);border-radius:var(--radius);cursor:pointer;
  transition:all .15s;text-transform:uppercase;letter-spacing:.06em;font-family:var(--font);
  text-decoration:none;display:inline-block;white-space:nowrap;
}
.reveal-btn:hover{border-color:var(--accent);color:var(--text)}
.reveal-btn.revealed{background:var(--accent);border-color:var(--accent);color:#000}
.siblings{font-size:.7rem;color:var(--text2);letter-spacing:.05em}
.siblings a{color:var(--accent);text-decoration:none;font-weight:600}
.siblings a:hover{color:var(--accent2)}

.controls{max-width:1100px;margin:0 auto;padding:.8rem 1.5rem;display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.search{
flex:1;min-width:200px;padding:.55rem .8rem;background:var(--surface);border:1px solid var(--border);
color:var(--text);font-family:var(--font);font-size:.85rem;border-radius:var(--radius);outline:none;transition:border .15s;
}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:#555}
.filters{display:flex;gap:.35rem;flex-wrap:wrap}
.filter-btn{
padding:.4rem .75rem;font-size:.75rem;font-weight:600;border:1px solid var(--border);
background:var(--surface);color:var(--text2);border-radius:var(--radius);cursor:pointer;
transition:all .15s;text-transform:uppercase;letter-spacing:.04em;font-family:var(--font);
}
.filter-btn:hover{border-color:#444;color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
.filter-btn[data-t="con"].active{background:var(--con);border-color:var(--con);color:#000}
.filter-btn[data-t="fair"].active{background:var(--fair);border-color:var(--fair);color:#000}
.filter-btn[data-t="market"].active{background:var(--market);border-color:var(--market);color:#000}
.filter-btn[data-t="exhibit"].active{background:var(--exhibit);border-color:var(--exhibit);color:#000}

.grid{max-width:1100px;margin:1rem auto;padding:0 1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.8rem}
.card{
background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
padding:1.2rem;cursor:default;transition:border-color .15s,transform .15s;position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.card[data-t="con"]::before{background:var(--con)}
.card[data-t="fair"]::before{background:var(--fair)}
.card[data-t="market"]::before{background:var(--market)}
.card[data-t="exhibit"]::before{background:var(--exhibit)}
.card:hover{border-color:#333;transform:translateY(-2px)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.5rem}
.card-title{font-family:var(--display);font-size:1.35rem;letter-spacing:.03em;line-height:1.1;color:var(--text);text-decoration:none;display:inline-block}
a.card-title:hover{color:var(--accent)}
.card-title .ext{font-size:.75rem;opacity:.4;margin-left:.15em;vertical-align:.1em}
a.card-title:hover .ext{opacity:1}
.tag{
font-size:.6rem;font-weight:600;padding:.2rem .5rem;border-radius:3px;
text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;flex-shrink:0;
}
.tag-con{background:rgba(34,211,238,.12);color:var(--con)}
.tag-fair{background:rgba(245,158,11,.12);color:var(--fair)}
.tag-market{background:rgba(244,114,182,.12);color:var(--market)}
.tag-exhibit{background:rgba(52,211,153,.12);color:var(--exhibit)}
.card-meta{display:flex;gap:1rem;font-size:.78rem;color:var(--text2);margin-bottom:.5rem;flex-wrap:wrap;align-items:center}
.card-meta svg{width:13px;height:13px;vertical-align:-2px;margin-right:3px;opacity:.6}
.loc-link{color:var(--text2);text-decoration:none;transition:color .15s}
.loc-link:hover{color:var(--accent)}
.loc-link:hover svg{opacity:1}
.countdown{font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.18rem .45rem;border-radius:3px;background:rgba(167,139,250,.15);color:var(--accent);white-space:nowrap}
.countdown.soon{background:var(--accent);color:#000}
.countdown.today{background:#fff;color:#000;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.card-desc{font-size:.8rem;color:#999;line-height:1.5}
.empty{grid-column:1/-1;text-align:center;padding:3rem 1rem;color:var(--text2);font-size:.9rem}

.stripe{max-width:1100px;margin:0 auto;padding:0 1.5rem}
.stripe hr{border:none;border-top:1px solid var(--border)}

.count{max-width:1100px;margin:0 auto;padding:.4rem 1.5rem;font-size:.72rem;color:var(--text2);letter-spacing:.03em}

.past-head{max-width:1100px;margin:2.5rem auto .4rem;padding:0 1.5rem;font-family:var(--display);font-size:1.6rem;letter-spacing:.06em;color:var(--text2);font-weight:400;border-top:1px solid var(--border);padding-top:1.5rem}
.past-head.hidden{display:none}
.grid.past .card{opacity:.55}
.grid.past .card:hover{opacity:1}

@media(max-width:640px){
  header{padding:1.2rem 1rem .6rem}
  .controls{padding:.6rem 1rem}
  .grid{padding:0 1rem;grid-template-columns:1fr;gap:.6rem}
  .stripe{padding:0 1rem}
  .count{padding:.4rem 1rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">ART<small>Thailand Art Events — curated</small></div>
  <div class="header-right">
    <div class="siblings">Also: <a href="index.html">Cars →</a></div>
    <div class="contact"><span class="contact-label">Talk to me:</span>
      <button class="reveal-btn" data-id="line" onclick="reveal(this)">Line</button>
      <button class="reveal-btn" data-id="ig" onclick="reveal(this)">Instagram</button>
      <button class="reveal-btn" data-id="wechat" onclick="reveal(this)">WeChat</button>
    </div>
    <div class="updated">Updated: <b id="updated-date">—</b></div>
  </div>
</header>

<div class="stripe"><hr></div>

<div class="controls">
  <input class="search" type="text" placeholder="Search events or locations…" oninput="render()">
  <div class="filters">
    <button class="filter-btn active" data-t="all" onclick="setFilter(this)">All</button>
    <button class="filter-btn" data-t="con" onclick="setFilter(this)">Cons</button>
    <button class="filter-btn" data-t="fair" onclick="setFilter(this)">Fairs</button>
    <button class="filter-btn" data-t="market" onclick="setFilter(this)">Markets</button>
    <button class="filter-btn" data-t="exhibit" onclick="setFilter(this)">Exhibits</button>
  </div>
</div>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>

<h2 class="past-head" id="past-head">Past Events</h2>
<div class="grid past" id="grid-past"></div>

<script>
const SVG_CAL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
const SVG_PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';

const EVENTS=[
{name:"Illust Fusion EXPO 2026",date:"2026-06-13",loc:"Paragon Hall, Siam Paragon, Bangkok",type:"fair",desc:"Two-day illustration + handmade goods fair. Artist booths by lottery, doujin products welcome. 10am–8pm, ฿120/day.",url:"https://if.enterdock.com/enginfoexpo/"},
{name:"Bangkok Illustration Fair 2026",date:"2026-10-22",loc:"centralwOrld PULSE, 7th floor, Bangkok",type:"fair",desc:"International illustration fair with exhibitions, sales, talks, and portfolio reviews. Oct 22–25.",url:"https://www.bangkokillustrationfair.com/"},
{name:"Comic Square 10",date:"2027-03-06",loc:"Union Hall, Union Mall, Bangkok",type:"con",desc:"Thailand's annual doujinshi convention, powered by Anitime. Expected early March 2027 based on the yearly pattern.",url:"https://cq.enterdock.com/en/about-cq/"},
{name:"Artbox Bangkok",date:"2026-05-02",loc:"JJ Green / rotating venues, Bangkok",type:"market",desc:"Creative night market — artists, designers, indie food, live music. Rotating weekends throughout the year.",url:"https://www.facebook.com/ArtBoxThailand/"},
{name:"Maker Faire Bangkok 2026",date:"2026-08-22",loc:"The Street Ratchada, Bangkok",type:"fair",desc:"Makers, DIY builders, robotics, handmade. Typically late August — confirm date closer to the event.",url:"https://www.facebook.com/MakerFaireBangkok/"},
{name:"Comic Square 9",date:"2026-03-07",loc:"Union Hall, Union Mall, Bangkok",type:"con",desc:"Thailand doujinshi convention. Fan art, circles, merch. Mar 7–8, 11am–6pm.",url:"https://www.zipeventapp.com/e/COMIC-SQUARE-9-85DF230A"},
{name:"Bangkok Design Week 2026",date:"2026-02-07",loc:"Charoenkrung, Talat Noi, Bangrak, Bangkok",type:"exhibit",desc:"City-wide creative festival. Installations, workshops, talks, open studios across old town Bangkok.",url:"https://www.bangkokdesignweek.com/"},
{name:"Japan Expo Thailand 2026",date:"2026-02-06",loc:"CentralWorld, Bangkok",type:"con",desc:"11th edition of the biggest all-Japan event in Thailand/Asia, themed 'Japan Thai United as One'. Free J-pop concerts, anime, cosplay, food, culture booths.",url:"https://www.japanexpothailand.com/"},
{name:"Animonium 2026",date:"2026-02-06",loc:"Paragon Hall, Siam Paragon, Bangkok",type:"con",desc:"First world-level licensed anime mega-festival in Thailand by DEX × Nippon Haku. 20+ Japanese partners, life-size Thousand Sunny set piece.",url:"https://www.paragonhall.com/en/events/23/ANIMONIUM-2026"},
{name:"Mango Art Festival 2026",date:"2026-03-04",loc:"River City Bangkok",type:"fair",desc:"6th edition under the theme 'ICON' across 2 floors. International galleries, indie and newcomer artist zones, talks. Free entry.",url:"https://www.mangoartfestival.com/mango-art-festival-2026"},
{name:"BUKRUK II Urban Arts Festival",date:"2026-03-12",loc:"BACC + Charoenkrung/Bangrak, Bangkok",type:"exhibit",desc:"Thai-Europe street art festival — wall paintings and gallery shows by Asian and European artists. Runs through May 31.",url:"https://www.bacc.or.th/en/events/59090"},
{name:"Bangkok International Book Fair 2026",date:"2026-03-26",loc:"Queen Sirikit National Convention Center, Bangkok",type:"fair",desc:"54th National Book Fair / 24th BKKIBF. 1,166+ booths, heavy indie comics & manga (40% of sales), author talks, rights trading.",url:"https://pubat.or.th/bkkibf/"},
{name:"Thailand Toy Expo 2026",date:"2026-04-02",loc:"CentralWorld, Bangkok",type:"fair",desc:"14th edition. SEA's flagship art-toy and sofubi event. 300+ brands from 14 countries under 'Tales of Toys'. Kaikai Kiki / Murakami drops, free entry.",url:"https://www.thailandtoyexpo.com/"},
{name:"Pattaya International Tattoo Convention",date:"2026-04-24",loc:"Central Beach, Pattaya",type:"con",desc:"6th edition, held on the beach. International tattoo artists, live tattooing, competitions, street-festival vibe.",url:"https://www.worldtattooevents.com/pattaya-tattoo-convention/"},
{name:"ASA Architect Expo 2026",date:"2026-04-28",loc:"Challenger Hall, IMPACT, Nonthaburi",type:"fair",desc:"ASEAN's largest building-tech and architecture expo. Theme 'SATI : WISDOM : PROMPT'. 1,000+ brands, ASA Forum, design pavilions. Free.",url:"https://architectexpo.com/"},
{name:"Irezumi War Vol.2",date:"2026-05-22",loc:"Bangkok (venue TBA)",type:"con",desc:"Japanese-style tattoo convention with artists and judges from 10+ countries. 3-day focus on irezumi/traditional Japanese imagery.",url:"https://www.worldtattooevents.com/irezumi-war-international-tattoo-convention/"},
{name:"Anime Festival Asia Thailand 2026",date:"2026-05-30",loc:"Queen Sirikit National Convention Center, Bangkok",type:"con",desc:"AFA returns to Thailand after a 10-year hiatus. AniSong concerts, Hololive meet-and-greet, creators exhibition, cosplay stage, gaming.",url:"https://animefestival.asia/"},
{name:"THEPOP 2026",date:"2026-06-18",loc:"centralwOrld PULSE, Bangkok",type:"fair",desc:"BCAF's debut art fair focused on IP art and art toys. 4,500 sqm, 80–90k expected visitors, character contest, designer-toy crossovers.",url:"https://bcafasia.com/"},
{name:"Life-Size Gundam RX-78 Bangkok",date:"2026-08-12",loc:"Siam Centre, Bangkok",type:"exhibit",desc:"First SEA tour stop for Japan's life-size RX-78 Gundam statue. Runs through Feb 12, 2027 with Gundam Base pop-up and Gunpla events.",url:"https://global.bandai-hobby.net/en-us/site/gbase_worldtour/"},
{name:"Bangkok Art Biennale 2026 — Angels and Mara",date:"2026-10-29",loc:"BACC, One Bangkok, Wat Arun, Wat Pho + citywide",type:"exhibit",desc:"5th edition of Thailand's flagship contemporary-art biennale. 4 months across heritage temples, museums, cultural hubs.",url:"https://www.bkkartbiennale.com/"},
{name:"gamescom asia × Thailand Game Show 2026",date:"2026-10-29",loc:"Queen Sirikit National Convention Center, Bangkok",type:"con",desc:"SEA's biggest gaming event. Business track, indie-dev zones, game art, esports. 206k+ visitors in 2025.",url:"https://gamescom.asia/"},
{name:"Land of Ink Bangkok Tattoo Convention #4",date:"2026-12-12",loc:"Bangkok (venue TBA)",type:"con",desc:"Community-oriented tattoo convention celebrating ink, creativity and live music. Broader/alt-style counterpart to Irezumi War.",url:"https://www.worldtattooevents.com/land-of-ink-bangkok-tattoo-convention/"},
{name:"Muse Anime Festival 2026",date:"2026-01-10",loc:"JAM SPACE, MBK Center, Bangkok",type:"exhibit",desc:"700+ sqm anime playground with 18 themed photo zones (Spy x Family, Demon Slayer, Dan Da Dan, Frieren). Through Mar 29, free entry.",url:"https://www.mbk-center.co.th/event/muse-anime-festival-2026/"},
{name:"Thailand Diecast Expo 2026",date:"2026-01-29",loc:"ICONSIAM, Bangkok",type:"fair",desc:"Thailand's largest diecast, model and collectible expo by the Bangkok Motor Show organizers. Adjacent to art-toy and model-kit collectors.",url:"https://www.thailandexhibition.com/en/thai-trade-show-details/thailand-diecast-expo-2026/25781"},
{name:"Pubpeab (Love) Zine Fair",date:"2026-02-14",loc:"Galileoasis, Bangkok",type:"market",desc:"Small indie zine fair co-organized by @galileoasis and @wuthipol.designs. Intimate Valentine's-weekend zine and small-press event.",url:"https://www.instagram.com/galileoasis/"},
{name:"Pattaya Tattoo Festival",date:"2026-10-02",loc:"Royal Garden Plaza, Pattaya",type:"con",desc:"Autumn tattoo festival at Royal Garden Plaza. Festival-style counterpart to the April beach convention.",url:"https://www.worldtattooevents.com/pattaya-tattoo-festival/"}
];

let filter='all';
function fmt(d){const o=new Date(d+'T00:00:00');return o.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function thaiToday(){
  const now=new Date();
  const thai=new Date(now.getTime()+(now.getTimezoneOffset()+420)*60000);
  return thai.toISOString().slice(0,10);
}
function daysUntil(d){
  const today=thaiToday();
  const a=new Date(today+'T00:00:00Z'),b=new Date(d+'T00:00:00Z');
  return Math.round((b-a)/86400000);
}
function countdown(d){
  const n=daysUntil(d);
  if(n<0)return '';
  if(n===0)return '<span class="countdown today">Today</span>';
  if(n===1)return '<span class="countdown soon">Tomorrow</span>';
  if(n<=7)return `<span class="countdown soon">${n} days left</span>`;
  let txt;
  if(n<14)txt=`${n} days left`;
  else if(n<60){const w=Math.round(n/7);txt=`${w} week${w!==1?'s':''} left`;}
  else if(n<365){const m=Math.round(n/30);txt=`${m} month${m!==1?'s':''} left`;}
  else{const y=Math.round(n/365);txt=`${y} year${y!==1?'s':''} left`;}
  return `<span class="countdown">${txt}</span>`;
}

function card(e){
  const title=e.url?`<a class="card-title" href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.name)} <span class="ext">↗</span></a>`:`<span class="card-title">${esc(e.name)}</span>`;
  return `
    <div class="card" data-t="${e.type}">
      <div class="card-head">
        ${title}
        <span class="tag tag-${e.type}">${e.type}</span>
      </div>
      <div class="card-meta">
        <span>${SVG_CAL} ${fmt(e.date)}</span>
        <a class="loc-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.loc)}" target="_blank" rel="noopener">${SVG_PIN} ${esc(e.loc)}</a>
        ${countdown(e.date)}
      </div>
      <div class="card-desc">${esc(e.desc)}</div>
    </div>`;
}

function render(){
  const q=document.querySelector('.search').value.toLowerCase();
  const today=thaiToday();
  const match=e=>{
    if(filter!=='all'&&e.type!==filter)return false;
    if(q&&!e.name.toLowerCase().includes(q)&&!e.loc.toLowerCase().includes(q))return false;
    return true;
  };
  const upcoming=EVENTS.filter(e=>e.date>=today&&match(e)).sort((a,b)=>a.date.localeCompare(b.date));
  const past=EVENTS.filter(e=>e.date<today&&match(e)).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('count').textContent=upcoming.length+' upcoming event'+(upcoming.length!==1?'s':'');
  const g=document.getElementById('grid');
  g.innerHTML=upcoming.length?upcoming.map(card).join(''):'<div class="empty">No upcoming events match your search.</div>';
  const gp=document.getElementById('grid-past');
  const ph=document.getElementById('past-head');
  if(past.length){gp.innerHTML=past.map(card).join('');ph.classList.remove('hidden');}
  else{gp.innerHTML='';ph.classList.add('hidden');}
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function setFilter(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');filter=btn.dataset.t;render();
}

const HANDLES={
  line:{handle:'pankajahuja',url:'https://line.me/R/ti/p/~pankajahuja'},
  ig:{handle:'pankajahuja',url:'https://instagram.com/pankajahuja'},
  wechat:{handle:'pankajoa',url:null}
};
function reveal(btn){
  const h=HANDLES[btn.dataset.id];if(!h)return;
  btn.classList.add('revealed');
  const label=btn.textContent.split(' —')[0];
  if(h.url){
    const a=document.createElement('a');
    a.className='reveal-btn revealed';a.href=h.url;a.target='_blank';a.rel='noopener';
    a.textContent=label+' — @'+h.handle;
    btn.replaceWith(a);
  }else{
    btn.textContent=label+' — '+h.handle;
    btn.onclick=()=>navigator.clipboard?.writeText(h.handle);
    btn.title='Click to copy';
  }
}

document.getElementById('updated-date').textContent=fmt(thaiToday());
render();
</script>
</body>
</html>
